# ShopTalk — GPU Override (NVIDIA only)
# Use on machines with an NVIDIA GPU for faster Ollama inference.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
